    <script>
        const COST_MAP = { "J寄賣款(8)": 9200, "J寄賣款/車": 7700, "G青春版(8)": 5980, "Q特惠版": 5000, "W高配版": 5335, "F旗艦版": 7170, "Q特惠X防盜": 4000, "8AH": 0, "20AH": 2365, "26AH": 2485, "30AH": 2020, "兒童座椅": 500, "定時器": 90, "水杯架": 70, "雙杯手機架": 155, "後照鏡2長": 75, "後座靠背": 100, "後腳踏/塑": 80, "後腳踏/鐵": 60, "維修服務": 0 };
        const DB_VERSION = 106;
const KEY = `YUCHILL_DB_V${DB_VERSION}`;
const PREVIOUS_VERSIONS = ["YUCHILL_DB_V102", "YUCHILL_DB_V101", "YUCHILL_DB_V103"];

if (!localStorage.getItem(KEY)) {
    for (const oldKey of PREVIOUS_VERSIONS) {
        const oldData = localStorage.getItem(oldKey);
        if (oldData) {
            let parsedData = JSON.parse(oldData);
            if (parsedData.logs) {
                parsedData.logs.forEach(l => {
                    if (l.type === 'sell' && (!l.baseCost || l.baseCost === 0)) {
                        // 修正舊資料利潤：車組+電池+配件 全部從 COST_MAP 抓出來加總
                        let oldCost = (COST_MAP[l.carName] || 0);
                        if (l.batt) oldCost += (COST_MAP[l.batt] || 0);
                        if (l.accessories) {
                            l.accessories.forEach(acc => { oldCost += (COST_MAP[acc] || 0); });
                        }
                        l.baseCost = oldCost;
                    }
                });
            }
            // -------------------------------------
            localStorage.setItem(KEY, oldData);
            console.log("資料已從", oldKey, "升級到", KEY);
            break;
        }
    }
}

        
        let db = JSON.parse(localStorage.getItem(KEY)) || { 
            stock: { "J寄賣款(8)":0, "J寄賣款/車":0, "G青春版(8)":0, "Q特惠版":0, "W高配版":0, "F旗艦版":0, "Q特惠X防盜":0, "8AH":0, "20AH":0, "26AH":0, "30AH":0, "兒童座椅":0, "定時器":0, "水杯架":0, "雙杯手機架":0, "後照鏡2長":0, "後座靠背":0, "後腳踏/塑":0, "後腳踏/鐵":0 }, 
            logs: [],
            withdraws: [] 
        };
        let currentMode = 'sell';

        function switchTab(t) {
            document.getElementById('page-main').style.display = t === 'main' ? 'block' : 'none';
            document.getElementById('page-report').style.display = t === 'report' ? 'block' : 'none';
            document.getElementById('tab-main').className = t === 'main' ? "flex-1 py-3 rounded-xl font-black transition-all bg-white shadow-sm" : "flex-1 py-3 rounded-xl font-black text-slate-500 transition-all";
            document.getElementById('tab-report').className = t === 'report' ? "flex-1 py-3 rounded-xl font-black transition-all bg-white shadow-sm" : "flex-1 py-3 rounded-xl font-black text-slate-500 transition-all";
            if(t === 'report') renderFinance();
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('m-sell').className = (m==='sell'?'bg-white text-indigo-600 shadow-sm ':'text-slate-400 ') + 'flex-1 py-4 rounded-xl font-black';
            document.getElementById('m-buy').className = (m==='buy'?'bg-white text-orange-600 shadow-sm ':'text-slate-400 ') + 'flex-1 py-4 rounded-xl font-black';
            document.getElementById('buy-qty-area').classList.toggle('hidden', m!=='buy');
            resetForm(); 
        }

        function generateNextBarcode() {
    const carEl = document.getElementById('f-car-type');
    const carCode = carEl.options[carEl.selectedIndex]?.dataset.code;
    const colorCode = document.getElementById('f-color').value || "0"; // 這裡會自動帶入 1~2 位數
    const dateStr = document.getElementById('f-date').value;

    if (!carCode || !dateStr) return "";

    const shortDate = dateStr.replace(/-/g, '').substring(2);

    // 修正：只要開頭是該車組代號的都列入計算，不限條碼長度
    const matchedLogs = db.logs.filter(l => 
        !l.void && 
        l.barcode && 
        l.barcode.charAt(0).toUpperCase() === carCode.charAt(0).toUpperCase()
    );

    let maxNum = 0;
    if (matchedLogs.length > 0) {
        // 修正：永遠取條碼最後兩位數作為流水號判斷
        const nums = matchedLogs.map(l => parseInt(l.barcode.slice(-2))).filter(n => !isNaN(n));
        if (nums.length > 0) maxNum = Math.max(...nums);
    }

    // 重點：maxNum + 1 是下一筆起始號達成批次遞增
    const nextNum = (maxNum + 1 ).toString().padStart(2, '0');
    
    return `${carCode}${colorCode}${shortDate}${nextNum}`;
}


        function handleBarcodeInput(val) {
            if(currentMode !== 'sell' || val.length < 5) return;
            const target = db.logs.find(l => !l.void && l.type === 'buy' && l.barcode === val.toUpperCase());
            if(target) {
                document.getElementById('f-car-type').value = target.carName;
                document.getElementById('f-vin').value = target.vin || "";
                document.getElementById('f-motor').value = target.motor || "";
                document.getElementById('f-batt').value = target.batt || "";
                document.getElementById('f-color').value = val.substring(1,2);
                document.getElementById('f-barcode').style.backgroundColor = "#f0fdf4";
            }
        }

        function autoRefreshBarcode() { 
            if(currentMode === 'buy') {
                const newCode = generateNextBarcode();
                if(newCode) document.getElementById('f-barcode').value = newCode;
            }
        }

        function doSave() {
    const dateVal = document.getElementById('f-date').value;
    if(!dateVal) return alert("請選擇日期");
    const qty = currentMode === 'buy' ? (parseInt(document.getElementById('f-qty').value) || 1) : 1;
    // 如果有選車組就用車組名，沒選車組但在進貨模式，就顯示「零件/配件進貨」
            let carName = document.getElementById('f-car-type').value;
            if (!carName) {
                carName = (currentMode === 'buy') ? "📦 零件/配件進貨" : "🛠️ 維修服務";
            }
    const batt = document.getElementById('f-batt').value;
    const accList = Array.from(document.querySelectorAll('.f-acc'))
    .map(el => el.value)
    .filter(v => v !== "");

        // --- 開始迴圈 ---
        for(let i=0; i<qty; i++) {
        let codeToUse = (currentMode === 'buy') ? generateNextBarcode() : document.getElementById('f-barcode').value.toUpperCase();
        if(!codeToUse) codeToUse = "MANUAL";

        // --- 1. 先計算這台車賣出去時的所有「硬成本」 ---
        let totalBaseCost = 0;
        if (currentMode === 'sell') {
            totalBaseCost += (COST_MAP[carName] || 0); // 車組進價
            if (batt) totalBaseCost += (COST_MAP[batt] || 0); // 電池進價
            accList.forEach(acc => {
                totalBaseCost += (COST_MAP[acc] || 0); // 配件進價
            });
        }

        const entry = {
            date: dateVal, carName, barcode: codeToUse,
            vin: document.getElementById('f-vin').value, 
            motor: document.getElementById('f-motor').value, 
            phone: document.getElementById('f-phone').value, 
            note: document.getElementById('f-note').value, 
            extraItem: document.getElementById('f-extra-item').value || "", 
            extraCost: parseInt(document.getElementById('f-extra-cost').value) || 0,
            
            // --- 2. 這裡改用計算好的總成本 ---
            baseCost: totalBaseCost, 
            // ------------------------------

            type: currentMode, void: false,
            cash: i===0 ? (parseInt(document.getElementById('f-cash').value)||0) : 0,
            bank: i===0 ? (parseInt(document.getElementById('f-bank').value)||0) : 0,
            accessories: accList,
            batt, ps: [] 
        };
        
        
        db.logs.unshift(entry); // 存入後，下一圈 generateNextBarcode 就會看到這一筆
        const mod = (currentMode === 'sell' ? -1 : 1);
        if(db.stock[carName] !== undefined) db.stock[carName] += mod;
        if(batt && db.stock[batt] !== undefined) db.stock[batt] += mod;
        accList.forEach(acc => {
            if(db.stock[acc] !== undefined) db.stock[acc] += mod;
        });
    } 
    // --- 迴圈結束 ---
                
    localStorage.setItem(KEY, JSON.stringify(db));
    render(); resetForm(); alert(`成功儲存 ${qty} 筆`);
}

// ⚠️ 請務必換成你部署 Google Apps Script 後得到的網址
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybhRci34OfbclDVM5jNXG2T8a0vHbionPVQFdvVAJZd_uwsfogFlCdwbUSScTTDzGc/exec"; 

// 功能一：☁️ 備份
async function syncToCloud(e) {
    // 檢查是否有交易紀錄 (修正原本 history.length 的錯誤)
    if (!db || db.logs.length === 0) {
        return alert("目前沒有紀錄可以備份");
    }

    // 取得按鈕並顯示讀取中狀態
    const btn = e ? e.currentTarget : event.currentTarget;
    const originalText = btn.innerHTML;
    btn.innerHTML = "<span>⌛ 同步中...</span>";
    btn.disabled = true;

    try {
        // 直接將全域變數 db (包含庫存與紀錄) 傳送到雲端
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify({ 
                type: 'SYNC_ALL', 
                data: db 
            })
        });
        
        alert('✅ 已備份至 Google 試算表！\n手機與電腦現在可以同步了。');
    } catch (error) {
        console.error("備份失敗:", error);
        alert('❌ 備份失敗，請檢查網路或 API 設定');
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}

// 功能二：📥 還原
async function loadFromCloud(e) {
    if (!confirm("⚠️ 確定要從雲端同步嗎？\n這會把這台裝置目前的紀錄「替換」成雲端上的資料。")) return;

    const btn = e ? e.currentTarget : event.currentTarget;
    const originalText = btn.innerHTML;
    btn.innerHTML = "<span>⌛ 讀取中...</span>";

    try {
        const response = await fetch(SCRIPT_URL);
        const cloudData = await response.json();

        // 檢查雲端回傳的是否為有效的資料物件
        if (cloudData && (cloudData.logs || cloudData.stock)) {
            // 關鍵修正：同時更新記憶體中的變數 db 與硬碟中的存檔
            db = cloudData; 
            localStorage.setItem(KEY, JSON.stringify(db));
            
            // 重新執行渲染函數，讓畫面立刻更新成雲端資料
            render(); 
            if (typeof renderFinance === "function") renderFinance();
            
            alert('✅ 同步成功！已載入最新紀錄。');
        } else {
            alert('查無雲端資料');
        }
    } catch (error) {
        console.error("同步失敗:", error);
        alert('❌ 讀取失敗，請確認 Google 腳本是否已正確部署並設為「所有人」');
    } finally {
        btn.innerHTML = originalText;
    }
}


        function resetForm() {
            document.getElementById('main-form').reset();
            document.getElementById('f-date').valueAsDate = new Date();
            document.getElementById('f-barcode').style.backgroundColor = "";
            autoRefreshBarcode();
            document.querySelectorAll('.f-acc').forEach(el => el.value = "");
        }

        function render() {
    document.getElementById('stk-grid').innerHTML = Object.entries(db.stock).map(([k,v]) => `<div class="bg-white p-4 rounded-2xl border text-center shadow-sm"><div class="text-[10px] font-black text-slate-300 truncate mb-1">${k}</div><div class="text-xl font-black ${v<=0?'text-slate-200':'text-indigo-600'}">${v}</div></div>`).join('');
    
    document.getElementById('log-list').innerHTML = db.logs.map((l, idx) => `
        <tr class="${l.void?'opacity-30 line-through':''}">
            <td class="p-6">
                <div class="text-[10px] font-mono text-indigo-500 font-bold mb-1">${l.date} | ${l.barcode}</div>
                
                <div class="font-bold text-slate-800">
                    ${(l.type === 'buy' && (l.carName === '維修服務' || !l.carName)) ? '📦 零件進貨' : l.carName}
                </div>
                
                <div class="text-[10px] text-slate-400 font-mono leading-relaxed">
                    ${(l.vin || l.motor) ? `${l.vin || '無'} / ${l.motor || '無'}` : ''}
                    
                    ${l.type === 'buy' ? `
                        <br><span class="text-orange-600 font-bold">🔋 電池: ${l.batt || '無'}</span>
                        <br><span class="text-orange-600 font-bold">🎁 配件: ${(l.accessories || []).join(', ') || '無'}</span>
                    ` : `
                        <br>📞 ${l.phone || '無'} | 📝 ${l.note || '無'}
                        <br><span class="text-indigo-600">🔋 電池: ${l.batt || '無'}</span>
                        <br><span class="text-indigo-600">🎁 配件: ${(l.accessories || []).join(', ') || '無'}</span>
                        ${l.extraItem ? `<br><span class="text-red-500">⚠️ 額外支出: ${l.extraItem} (-$${l.extraCost})</span>` : ''}
                    `}
                </div>
            </td>
            <td class="p-6 text-right font-black text-xl ${l.type==='buy'?'text-orange-500':'text-slate-950'}">
                ${l.type==='buy'?'-':''}$${(l.cash+l.bank).toLocaleString()}
            </td>
            <td class="p-6 text-center"><button onclick="askUndo(${idx})" class="text-slate-300 text-2xl">×</button></td>
        </tr>`).join('');
}

        function askUndo(idx) {
            if(confirm("確定刪除？")) {
                const l = db.logs[idx];
                const mod = (l.type === 'sell' ? 1 : -1);
                if(db.stock[l.carName] !== undefined) db.stock[l.carName] += mod;
                if(l.batt && db.stock[l.batt] !== undefined) db.stock[l.batt] += mod;
                if(l.accessories) {
                    l.accessories.forEach(acc => {
                        if(db.stock[acc] !== undefined) {
                            db.stock[acc] += mod;
        }
    });
}
                l.void = true;
                localStorage.setItem(KEY, JSON.stringify(db));
                render();
            }
        }

        function renderFinance() {
            let totalProfit = 0, stockCost = 0;
            const activeLogs = db.logs.filter(l => !l.void && l.type === 'sell');
            Object.entries(db.stock).forEach(([n, q]) => { if(q>0) stockCost += (q * (COST_MAP[n]||0)); });
            const totalWithdrawn = db.withdraws.reduce((sum, w) => sum + w.amount, 0);

            let html = `<h3 class="font-black text-xl mb-6">銷售利潤明細</h3><table class="w-full text-left"><thead><tr class="text-slate-400 text-sm border-b"><th class="pb-4">條碼</th><th class="pb-4">項目</th><th class="pb-4 text-right">利潤</th></tr></thead><tbody>`;
            activeLogs.forEach(l => {
                const income = (l.cash + l.bank);
                const extra = l.extraCost || 0;
                const currentCost = getRealCost(l); // 這是插入的新行，用來確保成本一定有算到
                const profit = income - currentCost - extra; // 這裡改用 currentCost 來減
                totalProfit += profit;
                html += `
                <tr class="border-b border-slate-50">
                <td class="py-4 font-mono text-xs">${l.barcode}</td>
                <td class="py-4">
                <div class="font-bold text-sm">${l.carName}</div>
                ${l.extraItem ? `<div class="text-[10px] text-red-400">支出: ${l.extraItem} (-$${extra})</div>` : ''}
                </td>
                <td class="text-right font-black text-emerald-600">$${profit.toLocaleString()}</td>
                </tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('profit-table-area').innerHTML = html;

            const reserveNeeded = Math.max(0, 100000 - stockCost);
            const canWithdrawTotal = totalProfit - reserveNeeded;
            const remainingWithdraw = canWithdrawTotal - totalWithdrawn;

            document.getElementById('fin-assets').innerHTML = `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border"><div class="text-xs font-black text-slate-400">總利潤</div><div class="text-2xl font-black">$${totalProfit.toLocaleString()}</div></div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border"><div class="text-xs font-black text-indigo-400">可提(扣預留)</div><div class="text-2xl font-black text-indigo-600">$${canWithdrawTotal.toLocaleString()}</div></div>
                <div class="bg-emerald-500 p-6 rounded-[2rem] text-white shadow-xl"><div class="text-xs font-black opacity-80">剩餘可提餘額</div><div class="text-3xl font-black">$${remainingWithdraw.toLocaleString()}</div></div>
            `;

            document.getElementById('withdraw-list').innerHTML = db.withdraws.map((w, i) => `<div class="flex justify-between bg-slate-800 p-3 rounded-xl"><span>${w.date}</span><b>$${w.amount}</b></div>`).join('');
        }

        // 這個函式會根據目前的項目名稱，即時算出該筆紀錄應有的總成本
        function getRealCost(l) {
            // 如果資料本來就有 baseCost 且不為 0，就用原本的
            if (l.baseCost && l.baseCost > 0) return l.baseCost;
            
            // 如果沒有 baseCost (雲端丟失了)，則根據名稱重新計算
            let cost = (COST_MAP[l.carName] || 0);
            if (l.batt) cost += (COST_MAP[l.batt] || 0);
            if (l.accessories) {
                l.accessories.forEach(acc => { cost += (COST_MAP[acc] || 0); });
            }
            return cost;
        }
        
        function addWithdraw() {
            const amt = parseInt(document.getElementById('f-withdraw').value);
            if(amt > 0) {
                db.withdraws.unshift({ date: new Date().toLocaleDateString(), amount: amt });
                localStorage.setItem(KEY, JSON.stringify(db));
                renderFinance();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(db, null, 2)], {type: "application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `YUCHILL_BACKUP.json`;
            a.click();
        }

        let html5QrCode = null;

        async function handleBarcodeScan() {
            const wrapper = document.getElementById('qr-reader-wrapper');
            wrapper.style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            
            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: { width: 280, height: 180 } },
                    (decodedText) => {
                        document.getElementById('f-barcode').value = decodedText.toUpperCase();
                        handleBarcodeInput(decodedText);
                        stopScan();
                    },
                    (err) => {}
                );
            } catch (err) {
                console.error("相機啟動失敗", err);
                document.getElementById('barcodeFileInput').click();
                wrapper.style.display = 'none';
            }
        }

        function stopScan() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('qr-reader-wrapper').style.display = 'none';
                });
            } else {
                document.getElementById('qr-reader-wrapper').style.display = 'none';
            }
        }

        document.getElementById('barcodeFileInput').onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const html5QrCodeStatic = new Html5Qrcode("reader");
            html5QrCodeStatic.scanFile(file, true)
                .then(decodedText => {
                    document.getElementById('f-barcode').value = decodedText.toUpperCase();
                    handleBarcodeInput(decodedText);
                })
                .catch(err => alert("無法辨識照片中的條碼"));
        };

        document.getElementById('f-date').valueAsDate = new Date();
        render();

        function clearAllData() {
    if (confirm("確定要刪除所有歷史紀錄與庫存資料嗎？此動作無法復原！")) {
        // 1. 清除所有的 localStorage 紀錄
        localStorage.clear();
        
        // 2. 清除 Service Worker 的快取 (讓程式更新到最新版)
        if ('caches' in window) {
            caches.keys().then(names => {
                for (let name of names) caches.delete(name);
            });
        }
        
        alert("資料已成功清除！程式將自動重新整理。");
        location.reload(); // 重新整理頁面
    }
}
